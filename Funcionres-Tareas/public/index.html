<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kanban Realtime - Gestor de Tareas</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <h1>Kanban Realtime</h1>
    <p>Sistema de Gestión de Tareas Ágil</p>
    <button id="open-modal-btn" class="main-add-btn">✨ Crear Nueva Tarea</button>
  </header>

  <main class="board">
    <div class="column" data-status="todo">
      <h2>📝 To Do</h2>
      <div class="dropzone" id="col-todo"></div>
    </div>

    <div class="column" data-status="doing">
      <h2>⚡ Doing</h2>
      <div class="dropzone" id="col-doing"></div>
    </div>

    <div class="column" data-status="done">
      <h2>✅ Done</h2>
      <div class="dropzone" id="col-done"></div>
    </div>
  </main>

  <template id="task-template">
    <div class="task" draggable="true">
      <div class="task-header">
        <div class="task-title"></div>
        <div class="task-priority"></div>
      </div>
      <div class="task-desc"></div>
      <div class="task-actions">
        <small>Doble clic para editar • Clic derecho para eliminar</small>
      </div>
    </div>
  </template>

  <!-- Modal para Crear Tarea -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-content">
      <h2>Nueva Tarea</h2>
      <form id="task-form">
        <div class="form-group">
          <label for="task-title-input">Título</label>
          <input type="text" id="task-title-input" placeholder="Ej: Diseñar la base de datos" required>
        </div>
        <div class="form-group">
          <label for="task-desc-input">Descripción</label>
          <textarea id="task-desc-input" rows="4" placeholder="Ej: Definir entidades, relaciones y tipos de datos..."></textarea>
        </div>
        <div class="form-group">
          <label for="task-priority-input">Prioridad</label>
          <select id="task-priority-input">
            <option value="high">🔥 Alta</option>
            <option value="medium" selected>⚡ Media</option>
            <option value="low">💚 Baja</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="button" class="cancel-btn">Cancelar</button>
          <button type="submit" class="save-btn">Guardar Tarea</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>

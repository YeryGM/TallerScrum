<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <!-- Formulario Login -->
    <div id="login-form" class="form">
        <h2>Iniciar Sesión</h2>
        <input type="email" id="login-email" placeholder="Email" required>
        <input type="password" id="login-password" placeholder="Contraseña" required>
        <button onclick="login()">Entrar</button>
        <p id="login-error" class="error"></p>
        <p class="toggle">¿No tienes cuenta? <span onclick="showRegister()">Regístrate</span></p>
        <p><a href="#">¿Olvidaste tu contraseña?</a></p>
    </div>

    <!-- Formulario Registro -->
    <div id="register-form" class="form" style="display:none;">
        <h2>Registro de Usuario</h2>
        <input type="text" id="reg-nombre" placeholder="Nombre" required>
        <input type="email" id="reg-email" placeholder="Email" required>
        <input type="password" id="reg-password" placeholder="Contraseña" required>
        <button onclick="register()">Registrarse</button>
        <p id="reg-error" class="error"></p>
        <p class="toggle">¿Ya tienes cuenta? <span onclick="showLogin()">Iniciar sesión</span></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
